name: Release to NuGet

# Publishes on version tags: git tag v1.0.0 && git push --tags
# Uses NuGet Trusted Publishing (OIDC) — no API key secrets stored anywhere.
# One-time setup on nuget.org: profile → Trusted Publishing → Add policy:
#   Repository owner: andrewbasarab, Repository: rekey, Workflow: release.yml
# Then fill in the `user:` field below with your nuget.org username.

on:
  push:
    tags: ['v*']

permissions:
  contents: write # create the GitHub Release
  id-token: write # required for Trusted Publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history + tags for release notes

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Test
        run: dotnet test -c Release

      - name: Pack (version from tag)
        run: dotnet pack Rekey/Rekey.csproj -c Release -p:Version=${GITHUB_REF_NAME#v} -o out

      - name: NuGet login (Trusted Publishing)
        id: login
        uses: NuGet/login@v1
        with:
          user: andrewbasarab

      - name: Push
        run: dotnet nuget push out/*.nupkg -s https://api.nuget.org/v3/index.json -k ${{ steps.login.outputs.NUGET_API_KEY }}

      - name: GitHub Release (notes from commit subjects + nupkg attached)
        env:
          GITHUB_TOKEN: ${{ github.token }}
        # --generate-notes only lists merged PRs; this repo commits straight to main,
        # so build the bullet list from commit subjects since the previous tag instead.
        run: |
          prev=$(git describe --tags --abbrev=0 "$GITHUB_REF_NAME^" 2>/dev/null || true)
          {
            echo "## What's changed"
            echo ""
            if [ -n "$prev" ]; then
              git log "$prev..$GITHUB_REF_NAME" --no-merges --pretty='- %s'
              echo ""
              echo "**Full Changelog**: https://github.com/$GITHUB_REPOSITORY/compare/$prev...$GITHUB_REF_NAME"
            else
              git log "$GITHUB_REF_NAME" --no-merges --pretty='- %s'
            fi
          } > notes.md
          gh release create "$GITHUB_REF_NAME" --notes-file notes.md --verify-tag out/*.nupkg
